<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="" id="frm">
        Username <br>
        <input type="text" name="user" id="user"> <br><br>
        Password <br>
        <input type="password" name="password" id="pass"><br><br>
        <input type="checkbox" name="checkbox" id="check">Remember me ! <br><br>
        <input type="submit" value="submit">
    </form>
    <!---js code start here -------->
    <script>
        let user = document.getElementById("user");
        let pass = document.getElementById("pass");
        let checkbox = document.getElementById("check");

        window.onload = function () {
            if (document.cookie !== "") {
                var data = document.cookie.split("=");
                user.value = data[1];
                pass.value = data[2];
                var rem = checkbox.checked = "checked";

                if (rem == "checked") {

                    checkbox.onclick = function () {
                        document.cookie = "data=; expires = mon,20 nov 2004 12:00:00 UTC";
                    }
                }


            }
        }
        checkbox.onclick = function () {
            document.cookie = "data=" + user.value + "=" + pass.value + "; expires =mon, 20 nov 2027 12:00:00 UTC";
        }
    </script>
</body>

</html>
